name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Check project structure
      run: |
        echo "=== Project Root ==="
        ls -la
        echo "=== App Directory ==="
        ls -la app/

    - name: Create gradle wrapper if missing
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.4
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info
      continue-on-error: true

    - name: Check Build outputs
      run: |
        echo "=== Build Directory ==="
        ls -la app/build/ 2>/dev/null || echo "No build directory"
        echo "=== Outputs Directory ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"
        echo "=== Find APK files ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK files found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: hashFiles('app/build/outputs/apk/debug/*.apk') != ''
      with:
        name: InstaDown-Debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: app/build/outputs/logs/
        if-no-files-found: ignore
