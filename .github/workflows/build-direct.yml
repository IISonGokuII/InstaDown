name: Build APK (Direct)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Build with Gradle
      run: |
        gradle assembleDebug --stacktrace --info

    - name: Check outputs
      run: |
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || true

    - name: Copy APK
      run: |
        mkdir -p output
        cp app/build/outputs/apk/debug/*.apk output/InstaDown-debug.apk || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InstaDown-APK
        path: output/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: output/*.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
