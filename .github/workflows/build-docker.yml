name: Build with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: 
      image: thyrlian/android-sdk:api-34
      options: --user root
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Gradle
      run: |
        export GRADLE_VERSION=8.4
        wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt
        export PATH=/opt/gradle-${GRADLE_VERSION}/bin:$PATH
        gradle --version
        echo "/opt/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        gradle assembleDebug --stacktrace --no-daemon
      env:
        ANDROID_HOME: /opt/android-sdk
        ANDROID_SDK_ROOT: /opt/android-sdk

    - name: Check outputs
      run: |
        find . -name "*.apk" -type f 2>/dev/null
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No output"

    - name: Prepare APK
      run: |
        mkdir -p apk-output
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          cp app/build/outputs/apk/debug/app-debug.apk apk-output/InstaDown-latest.apk
        fi
        ls -la apk-output/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InstaDown-APK
        path: apk-output/*.apk

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Build
        files: apk-output/*.apk
        draft: false
        prerelease: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
