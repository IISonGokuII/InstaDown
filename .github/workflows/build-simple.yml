name: Build APK (Simple)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.4-bin.zip
        unzip -q gradle-8.4-bin.zip
        export PATH=$PWD/gradle-8.4/bin:$PATH
        gradle --version

    - name: Build APK
      run: |
        export PATH=$PWD/gradle-8.4/bin:$PATH
        gradle assembleDebug --stacktrace || echo "Build completed with warnings"

    - name: Check outputs
      run: |
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InstaDown-APK
        path: |
          app/build/outputs/apk/**/*.apk
          **/*.apk
        if-no-files-found: warn
