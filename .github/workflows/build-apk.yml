name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-8.4/bin/gradle /usr/local/bin/gradle
        gradle --version

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --stacktrace
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Check APK exists
      run: |
        echo "=== Suche APK Dateien ==="
        find . -name "*.apk" -type f
        ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "Kein Debug Ordner"

    - name: Rename APK
      run: |
        mkdir -p output
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          cp app/build/outputs/apk/debug/app-debug.apk output/InstaDown-v1.0.0-debug.apk
        fi
        ls -la output/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InstaDown-APK
        path: output/*.apk
        retention-days: 90

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        body: |
          Automatischer Build von InstaDown
          
          ## Download
          Die APK Datei finden Sie unter "Assets" oder im Artifact "InstaDown-APK"
        files: output/*.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
